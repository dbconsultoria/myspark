services:
  spark-master:
    image: wlcamargo/spark-master:latest
    container_name: spark_master
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - D:/Github/myspark/spark/lakehouse:/data
      - D:/Github/myspark/spark/jobs:/opt/spark/jobs
    networks:
      - lakehouse_net

  notebook:
    image: jupyter/pyspark-notebook:latest
    container_name: spark_notebook
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - D:/Github/myspark/spark/lakehouse:/data
      - D:/Github/myspark/notebooks:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master:7077
    networks:
      - lakehouse_net
    depends_on:
      - spark-master

  kyuubi:
    image: apache/kyuubi:1.10.3-spark  # has Spark bundled in
    container_name: kyuubi
    restart: unless-stopped
    ports:
      - "10009:10009"
      - "10099:10099"
    environment:
      - SPARK_HOME=/opt/kyuubi/externals/spark-3.5.2-bin-hadoop3
    volumes:
      - ./kyuubi-defaults.conf:/opt/kyuubi/conf/kyuubi-defaults.conf
      - D:/Github/myspark/spark/lakehouse:/data
    depends_on:
      - spark-master
    networks:
      - lakehouse_net

  postgres:
    image: postgres:15
    container_name: airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse_net

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow_init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: 'apache-airflow-providers-apache-spark==4.1.5 --no-deps'
    volumes:
      - D:/Github/myspark/airflow/dags:/opt/airflow/dags
      - D:/Github/myspark/airflow/logs:/opt/airflow/logs
      - D:/Github/myspark/airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      bash -c "pip install apache-airflow-providers-apache-spark && airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    networks:
      - lakehouse_net

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      - airflow-init
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: 'apache-airflow-providers-apache-spark==4.1.5 --no-deps'
    volumes:
      - D:/Github/myspark/airflow/dags:/opt/airflow/dags
      - D:/Github/myspark/airflow/logs:/opt/airflow/logs
      - D:/Github/myspark/airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver
    networks:
      - lakehouse_net

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: 'apache-airflow-providers-apache-spark==4.1.5 --no-deps'
    volumes:
      - D:/Github/myspark/airflow/dags:/opt/airflow/dags
      - D:/Github/myspark/airflow/logs:/opt/airflow/logs
      - D:/Github/myspark/airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    networks:
      - lakehouse_net

volumes:
  airflow_postgres_data:

networks:
  lakehouse_net:
    external: true