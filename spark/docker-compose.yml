services:
  spark-master:
    image: wlcamargo/spark-master:latest
    container_name: spark_master
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - D:/Github/myspark/spark/lakehouse:/data
      - D:/Github/myspark/spark/jobs:/opt/spark/jobs
    networks:
      - lakehouse_net

  notebook:
    image: jupyter/pyspark-notebook:latest
    container_name: spark_notebook
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - D:/Github/myspark/spark/lakehouse:/data
      - D:/Github/myspark/notebooks:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master:7077
    networks:
      - lakehouse_net
    depends_on:
      - spark-master

networks:
  lakehouse_net:
    external: true
